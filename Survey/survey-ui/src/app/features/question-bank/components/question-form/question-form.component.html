<div class="container">
  <div class="page-header">
    <h1 class="page-title">{{ isEditMode ? 'Edit Question' : 'New Question' }}</h1>
  </div>

  <mat-card>
    <form [formGroup]="questionForm" (ngSubmit)="onSubmit()">
      <!-- Question Text -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Question Text</mat-label>
        <textarea matInput formControlName="questionText" rows="3" required></textarea>
        <mat-error *ngIf="questionForm.get('questionText')?.hasError('required')">
          Question text is required
        </mat-error>
        <mat-error *ngIf="questionForm.get('questionText')?.hasError('maxlength')">
          Question text cannot exceed 1000 characters
        </mat-error>
      </mat-form-field>

      <!-- Question Type -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Question Type</mat-label>
        <mat-select formControlName="questionType" required>
          <mat-option *ngFor="let type of questionTypes" [value]="type">
            {{ type }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Category -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Category</mat-label>
        <mat-select formControlName="categoryId">
          <mat-option [value]="null">None</mat-option>
          <mat-option *ngFor="let category of categories" [value]="category.id">
            {{ category.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Tags -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Tags (comma-separated)</mat-label>
        <input matInput formControlName="tags" placeholder="e.g., satisfaction, feedback">
        <mat-hint>Use commas to separate tags</mat-hint>
      </mat-form-field>

      <!-- Options (for choice questions) -->
      <div *ngIf="needsOptions()" class="options-section">
        <h3>Options</h3>
        <div formArrayName="options">
          <div *ngFor="let option of options.controls; let i = index" class="option-row">
            <div [formGroupName]="i" class="option-group">
              <mat-form-field appearance="outline" class="option-field">
                <mat-label>Option {{ i + 1 }}</mat-label>
                <input matInput formControlName="optionText" required>
              </mat-form-field>
              <button mat-icon-button type="button" (click)="removeOption(i)" color="warn">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </div>
        </div>
        <button mat-stroked-button type="button" (click)="addOption()" class="add-option-btn">
          <mat-icon>add</mat-icon>
          Add Option
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button mat-button type="button" (click)="cancel()">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="questionForm.invalid || loading">
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          <span *ngIf="!loading">{{ isEditMode ? 'Update' : 'Create' }}</span>
        </button>
      </div>
    </form>
  </mat-card>
</div>
