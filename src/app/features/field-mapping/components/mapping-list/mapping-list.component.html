<div class="mapping-list-container">
  <div class="header">
    <h1>Field Mappings</h1>
    <div class="actions">
      <button mat-raised-button color="accent" (click)="navigateToTest()">
        <mat-icon>science</mat-icon>
        Test Mappings
      </button>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon>
        Add Mapping
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="loading-spinner">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="error" class="error-message">
    <mat-icon>error</mat-icon>
    <p>{{ error }}</p>
  </div>

  <mat-card *ngIf="!loading && !error">
    <mat-card-content>
      <table mat-table [dataSource]="mappings" class="mappings-table">
        <ng-container matColumnDef="crmFieldName">
          <th mat-header-cell *matHeaderCellDef>CRM Field</th>
          <td mat-cell *matCellDef="let mapping">{{ mapping.crmFieldName }}</td>
        </ng-container>

        <ng-container matColumnDef="surveyFieldName">
          <th mat-header-cell *matHeaderCellDef>Survey Field</th>
          <td mat-cell *matCellDef="let mapping">{{ mapping.surveyFieldName }}</td>
        </ng-container>

        <ng-container matColumnDef="fieldType">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let mapping">
            <span class="field-type-badge">{{ mapping.fieldType }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="isRequired">
          <th mat-header-cell *matHeaderCellDef>Required</th>
          <td mat-cell *matCellDef="let mapping">
            <mat-icon *ngIf="mapping.isRequired" class="required-icon">check_circle</mat-icon>
            <mat-icon *ngIf="!mapping.isRequired" class="optional-icon">cancel</mat-icon>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let mapping">
            <button mat-icon-button (click)="openEditDialog(mapping)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="deleteMapping(mapping)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="mappings.length === 0" class="no-data">
        <mat-icon>inbox</mat-icon>
        <p>No field mappings configured yet.</p>
        <button mat-raised-button color="primary" (click)="openCreateDialog()">
          Create First Mapping
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
